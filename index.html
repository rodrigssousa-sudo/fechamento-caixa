<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bank King BRS - PRO</title>

  <style>
:root{
  --bg:#f4f7fb;
  --bg-soft:#eef3fb;
  --sidebar:#071631;
  --sidebar-2:#0a1c3f;
  --card:#ffffff;
  --card-soft:#fbfdff;
  --card-muted:#f8fafc;
  --border:rgba(15,23,42,.08);
  --border-strong:rgba(15,23,42,.14);
  --text:#0f172a;
  --muted:#64748b;
  --muted-2:#94a3b8;
  --primary:#1d4ed8;
  --primary-strong:#1e40af;
  --primary-soft:rgba(37,99,235,.08);
  --green:#16a34a;
  --green-soft:rgba(22,163,74,.10);
  --blue:#2563eb;
  --blue-soft:rgba(37,99,235,.08);
  --amber:#f59e0b;
  --amber-soft:rgba(245,158,11,.10);
  --red:#ef4444;
  --red-soft:rgba(239,68,68,.10);
  --purple:#7c3aed;
  --purple-soft:rgba(124,58,237,.08);
  --shadow:0 10px 30px rgba(15,23,42,.06);
  --shadow-soft:0 6px 18px rgba(15,23,42,.05);
  --radius:24px;
  --radius-md:18px;
  --radius-sm:14px;
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background: radial-gradient(circle at top left, rgba(37,99,235,.06), transparent 24%), linear-gradient(180deg, #f8fbff 0%, #f2f6fb 100%);
}

.hidden{display:none !important;}
.finance-total{font-weight:800;}
.green{color:var(--green)!important;}
.blue{color:var(--blue)!important;}
.red{color:var(--red)!important;}

button{border:0;cursor:pointer;font-weight:800;transition:transform .16s ease, opacity .16s ease;}
button:active{transform:scale(.98);}

input{
  width:100%; min-height:52px; padding:14px 16px; border-radius:16px;
  border:1px solid var(--border); background:#ffffff; color:var(--text)!important;
  font-size:16px; font-weight:700; outline:none;
}

.field{display:flex;flex-direction:column;gap:8px;}
.field label{font-size:12px;font-weight:800;color:var(--muted);}
.field-full{grid-column:1 / -1;}

/* Auth UI */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{width:100%;max-width:440px;background:#fff;border-radius:32px;box-shadow:var(--shadow);padding:28px;}
.auth-logo{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;background:linear-gradient(135deg, var(--primary), var(--primary-strong));margin-bottom:16px;}
.auth-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.auth-tab{min-height:44px;border-radius:14px;border:1px solid var(--border);background:#fff;}
.auth-tab.active{background:var(--primary);color:#fff;}
.auth-submit{min-height:52px;border-radius:16px;color:#fff;background:var(--primary);width:100%;margin-top:10px;}

/* Shell UI */
.app{width:100%;max-width:1240px;margin:0 auto;padding:18px 18px 120px;}
.header{position:sticky;top:0;z-index:50;padding:18px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);display:flex;justify-content:space-between;align-items:center;}
.top-user-bar{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#fff;border-radius:24px;margin-bottom:16px;box-shadow:var(--shadow-soft);}
.balance-strip{background:linear-gradient(135deg, #1d4ed8, #2563eb);padding:22px;border-radius:24px;color:#fff;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}

/* Cards */
.summary-flat-card, .turno-flat, .history-card, .modal-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:18px;margin-bottom:16px;}
.top-metrics{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:10px;}
.top-metric{padding:14px;border-radius:16px;border:1px solid var(--border);background:#f8fafc;}
.flat-form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

.dynamic-row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;align-items:end;padding:12px;background:#f8fafc;border-radius:16px;margin-bottom:8px;}
.remove-btn{padding:10px;background:var(--red-soft);color:var(--red);border-radius:12px;}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;box-shadow:0 -5px 15px rgba(0,0,0,0.05);z-index:100;}
.bottom-bar button{padding:12px;border-radius:12px;font-size:11px;}
.main-btn{background:var(--primary);color:#fff;}
.close-btn{background:var(--green);color:#fff;}

.modal{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);}
.modal-card{position:relative;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;background:#fff;border-radius:24px 24px 0 0;padding:24px;}

@media (max-width:700px){
    .flat-form-grid, .dynamic-row{grid-template-columns:1fr;}
    .top-metrics{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">BK</div>
      <h1 style="font-size:24px;margin-bottom:4px;">Bank King</h1>
      <p style="color:var(--muted);margin-bottom:20px;">Acesso Central King</p>

      <div class="auth-toggle">
        <button id="tabLogin" class="auth-tab active">Entrar</button>
        <button id="tabRegister" class="auth-tab">Registrar</button>
        <button id="tabForgot" class="auth-tab">Senha</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="field"><label>Email</label><input id="loginEmail" type="email" required /></div>
        <div class="field"><label>Senha</label><input id="loginPassword" type="password" required /></div>
        <div class="remember-row" style="margin-top:10px;">
          <input id="rememberLogin" type="checkbox" /> <label for="rememberLogin">Manter conectado</label>
        </div>
        <button class="auth-submit" type="submit">Entrar</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <div class="field"><label>Nome</label><input id="registerName" type="text" /></div>
        <div class="field"><label>Email</label><input id="registerEmail" type="email" /></div>
        <div class="field"><label>Senha</label><input id="registerPassword" type="password" /></div>
        <button class="auth-submit" type="submit">Registrar</button>
      </form>

      <form id="forgotPasswordForm" class="auth-form hidden">
        <div class="field"><label>Email de recuperação</label><input id="resetEmail" type="email" /></div>
        <button class="auth-submit" type="submit">Enviar Link</button>
      </form>
    </div>
  </section>

  <div id="appShell" class="app-shell hidden">
    <main class="app">
      <header class="header">
        <h2 style="margin:0">Bank King PRO</h2>
        <div id="activeUserName" style="font-weight:800; font-size:14px;">Usuário</div>
      </header>

      <div class="balance-strip">
        <div>
          <div style="font-size:12px;opacity:0.8">SALDO RECA ATUAL</div>
          <div id="bankValue" style="font-size:28px;font-weight:900;">$ 0,00</div>
        </div>
        <button id="toggleBalance" style="background:rgba(255,255,255,0.2);color:#fff;padding:10px;border-radius:50%">👁</button>
      </div>

      <div class="top-user-bar">
          <div id="activeUserEmail" style="color:var(--muted);font-size:12px;">email@exemplo.com</div>
          <button id="logoutBtn" class="red" style="background:none;">Sair da Conta</button>
      </div>

      <section class="turno-flat">
        <h3>Preenchimento de Turno (T2)</h3>
        <div class="flat-form-grid">
            <div class="field"><label>Operador</label><input type="text" id="t2_nome_operador" /></div>
            <div class="field"><label>Data</label><input type="date" id="t2_data_fechamento" /></div>
        </div>

        <div style="margin-top:20px; display:grid; gap:15px;">
            <div class="field"><label>Banco Reca</label><input type="text" id="t2_banco" placeholder="0,00" /></div>
            <div class="field"><label>Suprema (x400)</label><input type="text" id="t2_suprema" placeholder="0,00" /></div>
            <div class="field"><label>PPPoker (x400)</label><input type="text" id="t2_pppoker" placeholder="0,00" /></div>
            <div class="field"><label>Buffalo</label><input type="text" id="t2_buffalo" placeholder="0,00" /></div>
            <div class="field"><label>Ganamos</label><input type="text" id="t2_ganamos" placeholder="0,00" /></div>
            <div class="field"><label>Carga Fichas</label><input type="text" id="t2_cargas" placeholder="0,00" /></div>
            <div class="field"><label>Carga Poker (x400)</label><input type="text" id="t2_cargas_poker" placeholder="0,00" /></div>
        </div>

        <h4 style="margin:20px 0 10px; color:var(--red);">Saídas de Caixa</h4>
        <div id="t2_dynamic_list"></div>
        <button data-add-row="t2" style="width:100%; padding:12px; background:var(--bg-soft); border-radius:12px; margin-bottom:20px;">+ Adicionar Saída</button>

        <h4 style="margin:10px 0 10px; color:var(--amber);">Pagos Pendentes</h4>
        <div id="t2_pending_list"></div>
        <button data-add-pending="t2" style="width:100%; padding:12px; background:var(--bg-soft); border-radius:12px;">+ Adicionar Pendente</button>
      </section>

      <section class="history-section">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <h3>Histórico Recente</h3>
              <button id="toggleHistoryBtn" style="color:var(--primary);background:none;">Ver Tudo</button>
          </div>
          <div id="historyList" class="hidden"></div>
      </section>
    </main>

    <div class="bottom-bar">
        <button class="main-btn" id="calcular">CALCULAR</button>
        <button id="menuToggle">ANÁLISE</button>
        <button id="adminOpenBtn" style="background:var(--bg-soft)">ADMIN</button>
        <button class="close-btn" id="fecharTurno">FINALIZAR</button>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-backdrop" id="historyModalBackdrop"></div>
    <div class="modal-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 id="historyModalTitle">Detalhes</h3>
            <button id="closeHistoryModal" style="color:var(--red);background:none;">Fechar</button>
        </div>
        <div id="historyModalBody"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button id="editHistoryBtn" class="main-btn" style="flex:1">Editar</button>
            <button id="saveHistoryBtn" class="close-btn hidden" style="flex:1">Salvar</button>
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, limit, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuyfJNu2vwvVyH5gRsvg82m98teFCmPXw",
      authDomain: "bank-king-c53cf.firebaseapp.com",
      projectId: "bank-king-c53cf",
      storageBucket: "bank-king-c53cf.firebasestorage.app",
      messagingSenderId: "108865328748",
      appId: "1:108865328748:web:65dbbcf146a67f95512a49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const MASTER_CODE = "9507";
    let historyCache = [];
    let balanceVisible = true;

    // --- MÁSCARA MONETÁRIA ---
    function attachMoneyMask(input) {
      input.addEventListener("input", (e) => {
        let value = e.target.value.replace(/\D/g, "");
        value = (value / 100).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
        e.target.value = value === "0,00" ? "" : value;
      });
    }

    function parseMoney(val) {
      if (!val) return 0;
      return parseFloat(val.replace(/\./g, "").replace(",", "."));
    }

    // --- LÓGICA DE TURNOS ---
    function calcularSaldoLiquido(data) {
        const entradas = (data.reca || 0) + (data.suprema * 400) + (data.pppoker * 400) + (data.buffalo || 0) + (data.ganamos || 0);
        const cargas = (data.cargaFichas || 0) + (data.cargaPoker * 400);
        return entradas - cargas - (data.saidasTotal || 0) - (data.pendentesTotal || 0);
    }

    function serializeTurn(turnoPrefix) {
        const saidas = Array.from(document.querySelectorAll(`#${turnoPrefix}_dynamic_list .dynamic-row`)).map(row => ({
            name: row.querySelector('input[type="text"]').value,
            value: parseMoney(row.querySelectorAll('input')[1].value)
        }));

        const pendentes = Array.from(document.querySelectorAll(`#${turnoPrefix}_pending_list .dynamic-row`)).map(row => ({
            name: row.querySelector('input[type="text"]').value,
            value: parseMoney(row.querySelectorAll('input')[1].value)
        }));

        const data = {
            reca: parseMoney(document.getElementById(`${turnoPrefix}_banco`).value),
            suprema: parseMoney(document.getElementById(`${turnoPrefix}_suprema`).value),
            pppoker: parseMoney(document.getElementById(`${turnoPrefix}_pppoker`).value),
            buffalo: parseMoney(document.getElementById(`${turnoPrefix}_buffalo`).value),
            ganamos: parseMoney(document.getElementById(`${turnoPrefix}_ganamos`).value),
            cargaFichas: parseMoney(document.getElementById(`${turnoPrefix}_cargas`).value),
            cargaPoker: parseMoney(document.getElementById(`${turnoPrefix}_cargas_poker`).value),
            saidasTotal: saidas.reduce((acc, curr) => acc + curr.value, 0),
            pendentesTotal: pendentes.reduce((acc, curr) => acc + curr.value, 0),
            outflows: saidas,
            pendings: pendentes,
            dataFechamento: document.getElementById(`${turnoPrefix}_data_fechamento`).value
        };

        return {
            nomeOperador: document.getElementById(`${turnoPrefix}_nome_operador`).value,
            fechamentoDate: data.dataFechamento,
            turno: data,
            total: data.reca,
            submittedAt: serverTimestamp()
        };
    }

    // --- UI HELPERS ---
    function renderHistory() {
        const list = document.getElementById("historyList");
        list.innerHTML = historyCache.map((item, index) => `
            <div class="history-card" onclick="window.openDetails(${index})">
                <strong>${item.fechamentoDate} - ${item.nomeOperador}</strong>
                <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:13px;">
                    <span>Banco: $ ${item.total.toLocaleString()}</span>
                    <span class="blue">Ver Detalhes ></span>
                </div>
            </div>
        `).join("");

        if(historyCache[0]) {
            document.getElementById("bankValue").textContent = balanceVisible ? 
                `$ ${historyCache[0].total.toLocaleString("pt-BR", {minimumFractionDigits:2})}` : "••••••";
        }
    }

    window.openDetails = (index) => {
        const item = historyCache[index];
        document.getElementById("historyModalTitle").textContent = `Turno: ${item.nomeOperador}`;
        document.getElementById("historyModalBody").innerHTML = `
            <p>Data: ${item.fechamentoDate}</p>
            <p>Banco Reca: $ ${item.total.toLocaleString()}</p>
            <p>Saldo Líquido: $ ${calcularSaldoLiquido(item.turno).toLocaleString()}</p>
        `;
        document.getElementById("historyModal").classList.remove("hidden");
    };

    // --- EVENTOS ---
    document.getElementById("tabLogin").onclick = () => switchTab("login");
    document.getElementById("tabRegister").onclick = () => switchTab("register");
    document.getElementById("tabForgot").onclick = () => switchTab("forgot");

    function switchTab(tab) {
        document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
        document.getElementById("registerForm").classList.toggle("hidden", tab !== "register");
        document.getElementById("forgotPasswordForm").classList.toggle("hidden", tab !== "forgot");
        document.querySelectorAll(".auth-tab").forEach(b => b.classList.remove("active"));
        document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
    }

    document.querySelectorAll("[data-add-row]").forEach(btn => {
        btn.onclick = () => {
            const container = document.getElementById(btn.dataset.addRow + "_dynamic_list");
            const row = document.createElement("div");
            row.className = "dynamic-row";
            row.innerHTML = `<input type="text" placeholder="Descrição"><input type="text" placeholder="0,00"><button class="remove-btn">X</button>`;
            attachMoneyMask(row.querySelectorAll("input")[1]);
            row.querySelector(".remove-btn").onclick = () => row.remove();
            container.appendChild(row);
        };
    });

    document.getElementById("fecharTurno").onclick = async () => {
        const data = serializeTurn("t2");
        if(!data.nomeOperador) return alert("Digite o nome do operador");
        await addDoc(collection(db, "history"), data);
        alert("Turno Finalizado!");
        location.reload();
    };

    document.getElementById("adminOpenBtn").onclick = () => {
        if(prompt("Código Admin:") === MASTER_CODE) alert("Acesso Autorizado (Painel em desenvolvimento)");
    };

    document.getElementById("toggleBalance").onclick = () => {
        balanceVisible = !balanceVisible;
        renderHistory();
    };

    document.getElementById("toggleHistoryBtn").onclick = () => {
        document.getElementById("historyList").classList.toggle("hidden");
    };

    document.getElementById("closeHistoryModal").onclick = () => document.getElementById("historyModal").classList.add("hidden");

    // --- FIREBASE AUTH ---
    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("appShell").classList.remove("hidden");
            document.getElementById("activeUserName").textContent = user.email.split("@")[0];
            document.getElementById("activeUserEmail").textContent = user.email;
            
            const q = query(collection(db, "history"), orderBy("submittedAt", "desc"), limit(20));
            onSnapshot(q, snap => {
                historyCache = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderHistory();
            });
        } else {
            document.getElementById("authScreen").classList.remove("hidden");
            document.getElementById("appShell").classList.add("hidden");
        }
    });

    document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPassword").value);
        } catch(e) { alert("Erro: " + e.message); }
    };

    document.getElementById("logoutBtn").onclick = () => signOut(auth);

    // Iniciar Máscaras
    document.querySelectorAll('input[placeholder="0,00"]').forEach(attachMoneyMask);
    document.getElementById("t2_data_fechamento").valueAsDate = new Date();

  </script>
</body>
</html>
