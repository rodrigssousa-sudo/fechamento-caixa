<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bank King BRS - PRO</title>
  <style>
    :root {
      --primary: #1d4ed8; --primary-strong: #1e40af; --bg: #f4f7fb;
      --text: #0f172a; --muted: #64748b; --border: rgba(15,23,42,.08);
      --card: #ffffff; --shadow: 0 10px 30px rgba(15,23,42,.06);
      --green: #16a34a; --red: #ef4444; --amber: #f59e0b;
      --radius: 24px; --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: calc(80px + var(--safe-bottom)); }
    .hidden { display: none !important; }
    
    /* UI Geral */
    input { width: 100%; min-height: 50px; padding: 12px; border-radius: 14px; border: 1px solid var(--border); font-weight: 700; outline: none; }
    button { border: 0; cursor: pointer; font-weight: 800; transition: transform .1s; border-radius: 14px; }
    button:active { transform: scale(0.97); }
    .card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 16px; }

    /* Auth */
    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 32px; box-shadow: var(--shadow); text-align: center; }
    .auth-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 20px 0; }
    .auth-tab { padding: 10px; font-size: 12px; background: #f1f5f9; }
    .auth-tab.active { background: var(--primary); color: #fff; }
    .auth-submit { width: 100%; height: 50px; background: var(--primary); color: #fff; margin-top: 15px; }

    /* Header & Metrics */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .balance-strip { background: linear-gradient(135deg, var(--primary), #3b82f6); color: #fff; padding: 25px; border-radius: 24px; margin: 15px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .metric-box { background: #fff; padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; }
    .metric-value { font-size: 18px; font-weight: 900; }

    /* Forms Turno */
    .section-title { font-size: 14px; font-weight: 800; margin: 20px 0 10px; display: flex; justify-content: space-between; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dynamic-row { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
    .btn-add { width: 100%; padding: 12px; background: #f1f5f9; color: var(--primary); margin-top: 5px; }
    .remove-btn { color: var(--red); padding: 10px; font-size: 18px; }

    /* History & Lists */
    .history-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .history-item:hover { background: #f8fafc; }

    /* Modais */
    .modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-content { position: relative; width: 100%; max-width: 600px; background: #fff; border-radius: 30px 30px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }

    /* Bottom Bar */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 150; }
    .bottom-bar button { padding: 12px 5px; font-size: 10px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: var(--text); }
  </style>
</head>
<body>

  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div style="font-size: 30px; font-weight: 900; color: var(--primary);">BK</div>
      <h2>Bank King PRO</h2>
      <div class="auth-toggle">
        <button id="tabLogin" class="auth-tab active">Entrar</button>
        <button id="tabRegister" class="auth-tab">Registrar</button>
        <button id="tabForgot" class="auth-tab">Redefinir</button>
      </div>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required style="margin-bottom:10px">
        <input type="password" id="loginPassword" placeholder="Senha" required>
        <button type="submit" class="auth-submit">Acessar Sistema</button>
      </form>
      <form id="registerForm" class="hidden">
        <input type="text" id="regName" placeholder="Seu Nome" style="margin-bottom:10px">
        <input type="email" id="regEmail" placeholder="Email" style="margin-bottom:10px">
        <input type="password" id="regPassword" placeholder="Senha">
        <button type="submit" class="auth-submit">Criar Conta</button>
      </form>
    </div>
  </section>

  <div id="appShell" class="app-shell hidden">
    <header class="header">
      <div style="font-weight: 900;">BANK KING</div>
      <button id="logoutBtn" style="background:none; color:var(--red);">Sair</button>
    </header>

    <div class="balance-strip">
      <div style="font-size: 12px; opacity: 0.8;">SALDO RECA ATUAL</div>
      <div id="mainBankValue" style="font-size: 32px; font-weight: 900;">$ 0,00</div>
      <div id="activeUserName" style="font-size: 12px; margin-top: 5px; opacity: 0.9;">Carregando...</div>
    </div>

    <main style="padding: 15px;">
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-label">Diferença Real</div>
          <div id="diffRealVal" class="metric-value">$ 0,00</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Saldo Líquido T2</div>
          <div id="liquidoT2Val" class="metric-value">$ 0,00</div>
        </div>
      </div>

      <div class="card" style="background: #f8fafc;">
        <div class="section-title">
          <span>TURNO ANTERIOR (T1)</span>
          <button id="toggleT1" style="font-size: 10px; background: #fff; padding: 5px 10px;">MOSTRAR</button>
        </div>
        <div id="containerT1" class="hidden">
          <div class="grid-2">
            <div><label style="font-size: 10px;">RECA</label><input type="text" id="t1_reca" class="money"></div>
            <div><label style="font-size: 10px;">CARGA</label><input type="text" id="t1_carga" class="money"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">PREENCHIMENTO TURNO ATUAL (T2)</div>
        <div class="grid-2" style="margin-bottom: 15px;">
          <div><label style="font-size:10px">OPERADOR</label><input type="text" id="t2_op"></div>
          <div><label style="font-size:10px">DATA</label><input type="date" id="t2_date"></div>
        </div>
        
        <div class="grid-2">
          <div class="field"><label style="font-size:10px">BANCO RECA</label><input type="text" id="t2_reca" class="money"></div>
          <div class="field"><label style="font-size:10px">SUPREMA (x400)</label><input type="text" id="t2_suprema" class="money"></div>
          <div class="field"><label style="font-size:10px">PPPOKER (x400)</label><input type="text" id="t2_pppoker" class="money"></div>
          <div class="field"><label style="font-size:10px">BUFFALO</label><input type="text" id="t2_buffalo" class="money"></div>
          <div class="field"><label style="font-size:10px">GANAMOS</label><input type="text" id="t2_ganamos" class="money"></div>
          <div class="field"><label style="font-size:10px">CARGA FICHA</label><input type="text" id="t2_carga" class="money"></div>
        </div>

        <div class="section-title" style="color: var(--amber);">PENDENTES (SAÍDA)</div>
        <div id="t2_pendentes_list"></div>
        <button class="btn-add" onclick="addRow('t2_pendentes_list')">+ Novo Pendente</button>

        <div class="section-title" style="color: var(--red);">SAÍDAS DE CAIXA</div>
        <div id="t2_saidas_list"></div>
        <button class="btn-add" onclick="addRow('t2_saidas_list')">+ Nova Saída</button>
      </div>

      <div class="card">
        <div class="section-title">HISTÓRICO RECENTE</div>
        <div id="historyList"></div>
      </div>
    </main>

    <div class="bottom-bar">
      <button class="btn-secondary" id="btnAnálise">ANÁLISE</button>
      <button class="btn-secondary" id="btnAdmin">ADMIN</button>
      <button class="btn-secondary" id="btnPDF">PDF</button>
      <button class="btn-primary" id="btnFinalizar">FINALIZAR</button>
    </div>
  </div>

  <div id="modalHist" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3 id="modalTitle">Detalhes do Turno</h3>
      <div id="modalBody"></div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
        <button class="btn-secondary" id="btnCloseModal">Fechar</button>
        <button class="btn-primary" id="btnEditHist">Editar Dados</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuyfJNu2vwvVyH5gRsvg82m98teFCmPXw",
      authDomain: "bank-king-c53cf.firebaseapp.com",
      projectId: "bank-king-c53cf",
      storageBucket: "bank-king-c53cf.firebasestorage.app",
      messagingSenderId: "108865328748",
      appId: "1:108865328748:web:65dbbcf146a67f95512a49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_CODE = "9507";

    let historyData = [];
    let currentT1 = null;

    // --- MÁSCARAS E UTILITÁRIOS ---
    const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const parseM = (v) => parseFloat(v.replace(/\D/g, "") / 100) || 0;

    function applyMask(el) {
      el.addEventListener("input", e => {
        let v = e.target.value.replace(/\D/g, "");
        v = (v / 100).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
        e.target.value = v;
        calculateAll();
      });
    }

    window.addRow = (id, name = "", val = "") => {
      const div = document.createElement("div");
      div.className = "dynamic-row";
      div.innerHTML = `
        <input type="text" placeholder="Descrição" value="${name}">
        <input type="text" placeholder="0,00" class="money" value="${val}">
        <button class="remove-btn" onclick="this.parentElement.remove(); calculateAll();">×</button>
      `;
      document.getElementById(id).appendChild(div);
      applyMask(div.querySelectorAll("input")[1]);
    };

    // --- CÁLCULOS CORE ---
    function calculateAll() {
      const getV = (id) => parseM(document.getElementById(id).value);
      
      const t2_entradas = getV('t2_reca') + (getV('t2_suprema')*400) + (getV('t2_pppoker')*400) + getV('t2_buffalo') + getV('t2_ganamos');
      const t2_pendentes = Array.from(document.querySelectorAll('#t2_pendentes_list .money')).reduce((a,b) => a + parseM(b.value), 0);
      const t2_saidas = Array.from(document.querySelectorAll('#t2_saidas_list .money')).reduce((a,b) => a + parseM(b.value), 0);
      const t2_carga = getV('t2_carga');

      const liquidoT2 = t2_entradas - t2_pendentes - t2_saidas;
      const baseT2 = t2_entradas - t2_carga - t2_pendentes;

      document.getElementById('liquidoT2Val').innerText = fmt(liquidoT2);

      if (currentT1) {
        const t1_entradas = currentT1.turno.reca + (currentT1.turno.suprema*400) + (currentT1.turno.pppoker*400) + currentT1.turno.buffalo + currentT1.turno.ganamos;
        const t1_carga = currentT1.turno.carga;
        const t1_pendentes = currentT1.turno.pendentesTotal;
        const baseT1 = t1_entradas - t1_carga - t1_pendentes;
        
        const diffReal = baseT2 - baseT1;
        const elDiff = document.getElementById('diffRealVal');
        elDiff.innerText = fmt(diffReal);
        elDiff.style.color = diffReal >= 0 ? "var(--green)" : "var(--red)";
      }
    }

    // --- HISTÓRICO E NAVEGAÇÃO ---
    function renderHistory(docs) {
      historyData = docs;
      const list = document.getElementById("historyList");
      list.innerHTML = "";
      docs.forEach((d, i) => {
        const item = d.data();
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
            <strong>${item.fechamentoDate} - ${item.nomeOperador}</strong>
            <span style="font-weight:900">${fmt(item.turno.reca)}</span>
          </div>
          <div style="font-size:11px; color:var(--muted)">Clique para ver detalhes</div>
        `;
        div.onclick = () => showModalHist(d.id, item);
        list.appendChild(div);
      });

      if (docs.length > 0) {
        currentT1 = docs[0].data();
        document.getElementById("mainBankValue").innerText = fmt(currentT1.turno.reca);
        calculateAll();
      }
    }

    function showModalHist(id, data) {
      document.getElementById("modalTitle").innerText = `Turno: ${data.nomeOperador}`;
      document.getElementById("modalBody").innerHTML = `
        <div style="display:grid; gap:10px; font-size:13px;">
          <p>Data: ${data.fechamentoDate}</p>
          <p>Operador: ${data.nomeOperador}</p>
          <hr>
          <p>Banco Reca: ${fmt(data.turno.reca)}</p>
          <p>Total Cargas: ${fmt(data.turno.carga)}</p>
          <p>Total Saídas: ${fmt(data.turno.saidasTotal)}</p>
          <p>Total Pendentes: ${fmt(data.turno.pendentesTotal)}</p>
        </div>
      `;
      document.getElementById("modalHist").classList.remove("hidden");
    }

    // --- FINALIZAÇÃO E FIREBASE ---
    document.getElementById("btnFinalizar").onclick = async () => {
      if (prompt("Código de Segurança:") !== MASTER_CODE) return alert("Código Inválido");
      
      const getV = (id) => parseM(document.getElementById(id).value);
      const pendentes = Array.from(document.querySelectorAll('#t2_pendentes_list .dynamic-row')).map(r => ({
        name: r.querySelectorAll('input')[0].value,
        val: parseM(r.querySelectorAll('input')[1].value)
      }));
      const saidas = Array.from(document.querySelectorAll('#t2_saidas_list .dynamic-row')).map(r => ({
        name: r.querySelectorAll('input')[0].value,
        val: parseM(r.querySelectorAll('input')[1].value)
      }));

      const payload = {
        nomeOperador: document.getElementById('t2_op').value,
        fechamentoDate: document.getElementById('t2_date').value,
        submittedAt: serverTimestamp(),
        turno: {
          reca: getV('t2_reca'),
          suprema: getV('t2_suprema'),
          pppoker: getV('t2_pppoker'),
          buffalo: getV('t2_buffalo'),
          ganamos: getV('t2_ganamos'),
          carga: getV('t2_carga'),
          pendentesTotal: pendentes.reduce((a,b) => a + b.val, 0),
          saidasTotal: saidas.reduce((a,b) => a + b.val, 0),
          pendentesArr: pendentes,
          saidasArr: saidas
        }
      };

      try {
        await addDoc(collection(db, "history"), payload);
        alert("Turno Finalizado com Sucesso!");
        location.reload();
      } catch (e) { alert("Erro ao salvar: " + e.message); }
    };

    // --- AUTH LOGIC ---
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("authScreen").classList.add("hidden");
        document.getElementById("appShell").classList.remove("hidden");
        document.getElementById("activeUserName").innerText = "Operador Autenticado: " + user.email;
        onSnapshot(query(collection(db, "history"), orderBy("submittedAt", "desc"), limit(10)), snap => {
          renderHistory(snap.docs);
        });
      }
    });

    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      try {
        await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPassword").value);
      } catch (e) { alert("Falha no login"); }
    };

    document.getElementById("tabRegister").onclick = () => {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("registerForm").classList.remove("hidden");
    };

    // Inicialização
    document.querySelectorAll(".money").forEach(applyMask);
    document.getElementById("t2_date").valueAsDate = new Date();
    document.getElementById("btnCloseModal").onclick = () => document.getElementById("modalHist").classList.add("hidden");
    document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById("toggleT1").onclick = () => document.getElementById("containerT1").classList.toggle("hidden");

  </script>
</body>
</html>
