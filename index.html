</div>
          </div>
        </article>

        <article class="bank-card">
          <div class="bank-topline">
            <span class="bank-label">BANCA TOTAL</span>
            <button id="toggleBalance" class="hide-balance-btn">👁</button>
          </div>
          <div id="bankValue" class="bank-value">$ 0,00</div>
        </article>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Entradas</div>
            <div id="totalEntradas" class="metric-value green">$ 0,00</div>
          </div>

          <div class="metric">
            <div class="metric-label">Saídas</div>
            <div id="totalSaidas" class="metric-value red">$ 0,00</div>
          </div>

          <div class="metric">
            <div class="metric-label">Lucro / Prejuízo</div>
            <div id="lucroTotal" class="metric-value blue">$ 0,00</div>
          </div>
        </div>
      </section>

      <section class="history-card">
        <div class="history-card-top">
          <div>
            <div class="history-card-title">Histórico automático do turno</div>
            <div id="historyInfo" class="history-card-text">
              Nenhum turno anterior salvo ainda.
            </div>
          </div>
        </div>

        <div id="historyList" class="history-list"></div>

        <button id="deleteHistoryBtn" class="danger-mini-btn" type="button" style="margin-top:10px; width:100%;">
          🔴 Excluir Histórico
        </button>
      </section>

    </main>
  </div>

<script>
const HISTORY_STORAGE_KEY = "bank_history";
const DELETE_HISTORY_CODE = "1520";
const REPORT_CODE = "1520";
const PDF_CODE = "1520";

let balanceVisible = true;

function formatCurrency(value) {
  return value.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function render() {
  const entradas = 0;
  const saidas = 0;
  const lucro = entradas - saidas;

  document.getElementById("totalEntradas").textContent = formatCurrency(entradas);
  document.getElementById("totalSaidas").textContent = formatCurrency(saidas);
  document.getElementById("lucroTotal").textContent = formatCurrency(lucro);

  document.getElementById("bankValue").textContent = balanceVisible
    ? formatCurrency(lucro)
    : "••••••";

  const pill = document.getElementById("statusPill");

  if (lucro > 0) {
    pill.textContent = "Lucro";
    pill.className = "pill positive";
  } else if (lucro < 0) {
    pill.textContent = "Prejuízo";
    pill.className = "pill negative";
  } else {
    pill.textContent = "Sem diferença";
    pill.className = "pill neutral";
  }

  loadHistory();
}

function loadHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY)) || [];
  const list = document.getElementById("historyList");

  list.innerHTML = "";

  if (history.length === 0) {
    list.innerHTML = `<div class="history-empty">Sem histórico ainda.</div>`;
    return;
  }

  history.reverse().forEach((item) => {
    const div = document.createElement("div");
    div.className = "history-item";

    div.innerHTML = `
      <div class="history-item-top">
        <div class="history-user">${item.user || "Sistema"}</div>
        <div class="history-time">${item.date}</div>
      </div>
      <div class="history-item-grid">
        <div class="history-mini-card">
          <div class="history-mini-label">Lucro</div>
          <div class="history-mini-value">${formatCurrency(item.value)}</div>
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

function deleteHistoryProtected() {
  const senha = prompt("Digite a senha de 4 dígitos:");

  if (senha === null) return;

  if (senha !== DELETE_HISTORY_CODE) {
    alert("Senha incorreta.");
    return;
  }

  if (!confirm("Tem certeza que deseja excluir tudo?")) return;

  localStorage.removeItem(HISTORY_STORAGE_KEY);

  alert("Histórico apagado.");
  render();
}

document.getElementById("deleteHistoryBtn").addEventListener("click", deleteHistoryProtected);

document.getElementById("toggleBalance").addEventListener("click", () => {
  balanceVisible = !balanceVisible;
  render();
});

render();
</script>

</body>
</html>
