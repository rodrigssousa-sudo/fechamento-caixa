<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Bank King PRO | Swiss Ledger</title>

  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #0a1020;
      --muted: #667085;
      --border: rgba(10,16,32,.09);
      --primary: #102a56;
      --primary2: #1f4f99;
      --gold: #c7a45a;
      --green: #128044;
      --red: #be2633;
      --shadow-soft: 0 12px 30px rgba(10,16,32,0.05);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; padding: 0; 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #f8fafc; 
      color: var(--text);
      padding-bottom: 100px; /* Espaço para a barra inferior */
    }

    .hidden { display: none !important; }

    /* --- TOPBAR REFORMULADA --- */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 42px; height: 42px; background: var(--primary);
      color: #fff; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-weight: 900;
      box-shadow: 0 8px 16px rgba(16,42,86,0.2);
    }
    .brand-info h1 { font-size: 18px; margin: 0; letter-spacing: -0.5px; }
    .brand-info p { font-size: 11px; margin: 0; color: var(--muted); font-weight: 600; }

    /* --- BOTÕES DE AÇÃO NA BASE (MOBILE FIRST) --- */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      padding: 12px 20px calc(12px + var(--safe-bottom));
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      z-index: 200; box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
    }

    .btn-main {
      height: 52px; border-radius: 16px; border: none;
      font-weight: 800; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: var(--primary); }

    /* --- MENU FLUTUANTE CORRIGIDO --- */
    .menu-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: #f1f5f9; border: none; font-size: 20px;
    }
    .floating-menu {
      position: fixed; top: 70px; right: 20px; z-index: 150;
      width: 260px; background: #fff; border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid var(--border);
      padding: 8px; transform-origin: top right; transition: 0.2s ease;
    }
    .menu-item {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: none; background: transparent; text-align: left;
      font-weight: 700; color: var(--text); font-size: 14px;
    }
    .menu-item:active { background: #f8fafc; color: var(--primary); }

    /* --- CARDS E CONTEÚDO --- */
    .app-content { padding: 20px; max-width: 800px; margin: 0 auto; }
    
    .card {
      background: #fff; border-radius: 24px; padding: 20px;
      margin-bottom: 20px; border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .balance-hero {
      background: linear-gradient(135deg, #06152e, #1f4f99);
      color: #fff; padding: 30px; border-radius: 28px; position: relative;
      overflow: hidden;
    }
    .balance-hero::after {
      content: ""; position: absolute; top: -20px; right: -20px;
      width: 100px; height: 100px; background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .balance-hero small { opacity: 0.7; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
    .balance-hero h2 { font-size: 32px; margin: 5px 0 0; font-weight: 900; }

    /* --- INPUTS --- */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    input {
      width: 100%; height: 50px; border-radius: 14px; border: 1px solid #e2e8f0;
      padding: 0 15px; font-size: 16px; font-weight: 700; background: #fbfcfe;
    }
    input:focus { border-color: var(--primary); outline: none; background: #fff; }

    /* --- ADMIN PANEL --- */
    .admin-badge {
      font-size: 9px; background: #e0f2fe; color: #0369a1;
      padding: 2px 8px; border-radius: 6px; font-weight: 900;
    }
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; border-bottom: 1px solid #f1f5f9; gap: 10px;
    }
    .user-info b { font-size: 14px; display: block; }
    .user-info span { font-size: 11px; color: var(--muted); }
    .btn-action-small { padding: 8px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 800; }

    /* --- AUTH --- */
    .auth-container {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: #fff;
    }
    .auth-card { width: 100%; max-width: 400px; text-align: center; }
    .auth-tabs { display: flex; gap: 5px; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
    .auth-tab { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 800; font-size: 13px; color: var(--muted); }
    .auth-tab.active { background: #fff; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    @media (max-width: 600px) {
      .topbar { padding: 10px 15px; }
      .brand-logo { width: 34px; height: 34px; font-size: 14px; }
      .brand-info h1 { font-size: 16px; }
      .balance-hero { padding: 20px; }
      .balance-hero h2 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <section id="authScreen" class="auth-container">
    <div class="auth-card">
      <div class="brand-logo" style="margin: 0 auto 20px; width: 60px; height: 60px; font-size: 24px;">BK</div>
      <h1 style="letter-spacing: -1px; margin-bottom: 5px;">Bank King PRO</h1>
      <p style="color: var(--muted); font-weight: 600; font-size: 14px; margin-bottom: 30px;">Acesso Restrito Swiss Ledger</p>

      <div class="auth-tabs">
        <button id="tabLogin" class="auth-tab active">Entrar</button>
        <button id="tabRegister" class="auth-tab">Novo Operador</button>
      </div>

      <form id="loginForm">
        <div class="field"><input id="loginEmail" type="email" placeholder="E-mail" required /></div>
        <div class="field"><input id="loginPassword" type="password" placeholder="Senha" required /></div>
        <button type="submit" class="btn-main btn-primary" style="width: 100%;">Entrar no Sistema</button>
      </form>

      <form id="registerForm" class="hidden">
        <div class="field"><input id="regName" type="text" placeholder="Nome Completo" required /></div>
        <div class="field"><input id="regEmail" type="email" placeholder="E-mail de Trabalho" required /></div>
        <div class="field"><input id="regPass" type="password" placeholder="Criar Senha" required /></div>
        <button type="submit" class="btn-main btn-primary" style="width: 100%;">Solicitar Acesso</button>
      </form>
    </div>
  </section>

  <div id="appShell" class="hidden">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">BK</div>
        <div class="brand-info">
          <h1>Bank King</h1>
          <p>Swiss Ledger Control</p>
        </div>
      </div>
      <button id="menuToggle" class="menu-btn">☰</button>
    </header>

    <main class="app-content">
      
      <section id="adminPanel" class="card hidden" style="border: 2px solid #e0f2fe;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="margin:0; font-size:16px;">👑 Gestão de Equipe</h3>
          <span class="admin-badge">ADMIN MODE</span>
        </div>
        <div id="usersList">
          </div>
      </section>

      <section class="balance-hero">
        <small>Banco Reca Atual</small>
        <h2 id="bankValue">R$ 0,00</h2>
      </section>

      <div class="card" style="margin-top: 20px;">
        <h3 style="font-size:14px; text-transform:uppercase; color:var(--muted); margin-bottom:15px;">Fechamento de Turno</h3>
        <div class="field">
          <label>Operador Ativo</label>
          <input id="t2_nome_operador" type="text" readonly style="background: #f1f5f9; color: #64748b;" />
        </div>
        <div class="field">
          <label>Data</label>
          <input id="t2_data_fechamento" type="date" />
        </div>
        <div class="field">
          <label>Saldo Reca (R$)</label>
          <input id="t2_banco" type="text" inputmode="numeric" placeholder="0,00" />
        </div>
        <div class="field">
          <label>Suprema (Fichas)</label>
          <input id="t2_suprema" type="text" inputmode="numeric" placeholder="0" />
        </div>
      </div>

      </main>

    <div class="action-bar">
      <button id="btnCalcular" class="btn-main btn-secondary">Calcular</button>
      <button id="btnFecharTurno" class="btn-main btn-primary">Finalizar</button>
    </div>

    <div id="mainMenu" class="floating-menu hidden">
      <button class="menu-item" id="btnAdminView">Painel Admin</button>
      <button class="menu-item" id="btnVerHistorico">Ver Histórico</button>
      <button class="menu-item" id="btnLogout" style="color: var(--red);">Sair do Sistema</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuyfJNu2vwvVyH5gRsvg82m98teFCmPXw",
      authDomain: "bank-king-c53cf.firebaseapp.com",
      projectId: "bank-king-c53cf",
      storageBucket: "bank-king-c53cf.firebasestorage.app",
      messagingSenderId: "108865328748",
      appId: "1:108865328748:web:65dbbcf146a67f95512a49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userData = null;

    // --- INTERFACE ---
    const menuToggle = document.getElementById('menuToggle');
    const mainMenu = document.getElementById('mainMenu');

    // CORREÇÃO DOS 3 TRAÇOS (Abertura e Fechamento)
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      mainMenu.classList.toggle('hidden');
    });

    document.addEventListener('click', () => mainMenu.classList.add('hidden'));

    // --- AUTENTICAÇÃO ---
    const authScreen = document.getElementById('authScreen');
    const appShell = document.getElementById('appShell');

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docRef = doc(db, "users", user.uid);
        const snap = await getDoc(docRef);
        
        if (snap.exists()) {
          const data = snap.data();
          if (data.status === 'active') {
            userData = data;
            userData.uid = user.uid;
            showApp();
          } else {
            alert("Sua conta aguarda aprovação.");
            await signOut(auth);
          }
        }
      } else {
        authScreen.classList.remove('hidden');
        appShell.classList.add('hidden');
      }
    });

    function showApp() {
      authScreen.classList.add('hidden');
      appShell.classList.remove('hidden');
      document.getElementById('t2_nome_operador').value = userData.name;
      document.getElementById('t2_data_fechamento').value = new Date().toISOString().split('T')[0];
      
      if (userData.role === 'admin') {
        document.getElementById('btnAdminView').classList.remove('hidden');
      } else {
        document.getElementById('btnAdminView').classList.add('hidden');
      }
    }

    // Login
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
      } catch (err) { alert("Erro ao entrar: " + err.message); }
    };

    // Cadastro
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const userCred = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
        await setDoc(doc(db, "users", userCred.user.uid), {
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          role: 'operador',
          status: 'pending',
          createdAt: serverTimestamp()
        });
        alert("Solicitação enviada ao admin!");
        location.reload();
      } catch (err) { alert(err.message); }
    };

    // Alternar Tabs Auth
    document.getElementById('tabLogin').onclick = () => {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
    };
    document.getElementById('tabRegister').onclick = () => {
      document.getElementById('registerForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('tabLogin').classList.remove('active');
    };

    // --- FUNÇÕES ADMIN (ACEITAR CONTAS) ---
    async function loadAdminUsers() {
      const list = document.getElementById('usersList');
      list.innerHTML = "Carregando...";
      const snap = await getDocs(collection(db, "users"));
      list.innerHTML = "";
      snap.forEach(uDoc => {
        const u = uDoc.data();
        const row = document.createElement('div');
        row.className = 'user-row';
        row.innerHTML = `
          <div class="user-info">
            <b>${u.name}</b>
            <span>${u.email} [${u.status}]</span>
          </div>
          <div>
            ${u.status === 'pending' ? `<button class="btn-action-small" style="background:#dcfce7; color:#128044;" onclick="updateStatus('${uDoc.id}', 'active')">Aceitar</button>` : ''}
            <button class="btn-action-small" style="background:#fee2e2; color:#be2633;" onclick="updateStatus('${uDoc.id}', 'blocked')">Bloquear</button>
          </div>
        `;
        list.appendChild(row);
      });
    }

    window.updateStatus = async (uid, newStatus) => {
      await updateDoc(doc(db, "users", uid), { status: newStatus });
      alert("Status atualizado!");
      loadAdminUsers();
    };

    document.getElementById('btnAdminView').onclick = () => {
      document.getElementById('adminPanel').classList.toggle('hidden');
      loadAdminUsers();
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth);

  </script>
</body>
</html>
