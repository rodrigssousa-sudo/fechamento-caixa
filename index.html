<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Bank King PRO</title>

  <style>

    :root {

      --bg: #030712;

      --bg-2: #081120;

      --card: rgba(10, 18, 34, 0.96);

      --border: rgba(148, 163, 184, 0.12);

      --text: #f8fafc;

      --muted: #8fa2c0;

      --accent: #0f4cbd;

      --accent-2: #1d4ed8;

      --green: #22c55e;

      --red: #ef4444;

      --amber: #f59e0b;

      --shadow: 0 14px 34px rgba(0,0,0,.45);

      --radius: 20px;

      --radius-sm: 14px;

      --safe-bottom: env(safe-area-inset-bottom, 0px);

    }

    * {

      box-sizing: border-box;

      -webkit-tap-highlight-color: transparent;

    }

    html, body {

      margin: 0;

      padding: 0;

    }

    body {

      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background:

        radial-gradient(circle at top, rgba(29,78,216,.18), transparent 28%),

        linear-gradient(180deg, #020611 0%, #06101d 45%, #030712 100%);

      color: var(--text);

      min-height: 100vh;

    }

    .hidden { display: none !important; }

    .auth-screen {

      min-height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      padding: 20px;

    }

    .auth-card {

      width: 100%;

      max-width: 430px;

      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)), var(--card);

      border: 1px solid var(--border);

      border-radius: 24px;

      box-shadow: var(--shadow);

      padding: 22px;

    }

    .auth-logo,

    .logo-bk {

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      font-weight: 900;

      color: #f59e0b;

      border: 2px solid #f59e0b;

      box-shadow: 0 0 0 2px rgba(245,158,11,.10);

      flex-shrink: 0;

    }

    .auth-logo {

      width: 54px;

      height: 54px;

      font-size: 18px;

      margin-bottom: 14px;

    }

    .logo-bk {

      width: 42px;

      height: 42px;

      font-size: 16px;

    }

    .auth-title {

      margin: 0 0 6px;

      font-size: 30px;

      letter-spacing: -.04em;

    }

    .auth-subtitle,

    .auth-note {

      color: var(--muted);

      font-size: 13px;

      line-height: 1.45;

    }

    .auth-subtitle { margin: 0 0 18px; }

    .auth-note { margin-top: 12px; font-size: 12px; }

    .auth-toggle {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 8px;

      margin-bottom: 16px;

    }

    .auth-tab,

    .auth-submit,

    button {

      border: 0;

      cursor: pointer;

      font-weight: 800;

    }

    .auth-tab {

      min-height: 42px;

      border-radius: 14px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.05);

      color: #dbeafe;

    }

    .auth-tab.active {

      background: linear-gradient(135deg, #0f4cbd, #2563eb);

      border-color: rgba(96,165,250,.18);

    }

    .auth-form {

      display: grid;

      gap: 12px;

    }

    .field {

      display: flex;

      flex-direction: column;

      gap: 7px;

    }

    .field label {

      font-size: 12px;

      font-weight: 700;

      color: var(--muted);

    }

    .field input {

      width: 100%;

      min-height: 48px;

      border-radius: var(--radius-sm);

      border: 1px solid rgba(148,163,184,.10);

      background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(13,26,48,.96));

      color: var(--text);

      padding: 13px 14px;

      font-size: 16px;

      outline: none;

    }

    .field input[type="date"] {

      color-scheme: dark;

    }

    .field input::placeholder {

      color: #6f84a8;

      opacity: 1;

    }

    .field input:focus {

      border-color: rgba(96,165,250,.34);

      box-shadow: 0 0 0 4px rgba(29,78,216,.12);

    }

    .auth-submit {

      min-height: 50px;

      border-radius: 14px;

      color: white;

      font-size: 15px;

      background: linear-gradient(135deg, #0f4cbd, #2563eb);

      box-shadow: 0 10px 28px rgba(15,76,189,.34);

      margin-top: 4px;

    }

    .remember-row {

      display: flex;

      align-items: center;

      gap: 10px;

      padding: 10px 12px;

      border-radius: 14px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.03);

    }

    .remember-row input[type="checkbox"] {

      width: 18px;

      height: 18px;

      min-height: unset;

      margin: 0;

      accent-color: #2563eb;

      cursor: pointer;

    }

    .remember-row label {

      margin: 0;

      font-size: 13px;

      font-weight: 700;

      color: #dbeafe;

      cursor: pointer;

    }

    .app-shell {

      width: 100%;

    }

    .app {

      width: 100%;

      max-width: 1180px;

      margin: 0 auto;

      padding: 14px 14px calc(98px + var(--safe-bottom));

    }

    .header {

      position: sticky;

      top: 0;

      z-index: 40;

      margin: -14px -14px 14px;

      padding: 14px 14px 12px;

      background: linear-gradient(180deg, rgba(3,7,18,.98), rgba(3,7,18,.88));

      backdrop-filter: blur(12px);

      border-bottom: 1px solid rgba(96,165,250,.08);

    }

    .title-row,

    .brand,

    .summary-head,

    .bank-topline,

    .top-user-bar,

    .history-item-top,

    .report-head,

    .report-list-top,

    .turno-head,

    .finance-head,

    .modal-head {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 10px;

    }

    .brand {

      justify-content: flex-start;

      gap: 12px;

    }

    .menu-toggle-btn {

      width: 42px;

      height: 42px;

      border-radius: 12px;

      border: 1px solid rgba(148,163,184,.12);

      background: rgba(255,255,255,.04);

      display: inline-flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      gap: 4px;

      padding: 0;

      box-shadow: 0 8px 20px rgba(0,0,0,.18);

    }

    .menu-toggle-btn span {

      display: block;

      width: 18px;

      height: 2px;

      border-radius: 999px;

      background: #eaf2ff;

    }

    h1 {

      margin: 0;

      font-size: 26px;

      line-height: 1.05;

      letter-spacing: -.03em;

    }

    .badge {

      flex-shrink: 0;

      font-size: 11px;

      font-weight: 700;

      padding: 8px 12px;

      border-radius: 999px;

      color: #dbeafe;

      background: linear-gradient(135deg, rgba(15,76,189,.28), rgba(29,78,216,.18));

      border: 1px solid rgba(96,165,250,.16);

      white-space: nowrap;

      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);

    }

    .summary {

      display: grid;

      gap: 12px;

      margin-bottom: 14px;

    }

    .card {

      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)), var(--card);

      border: 1px solid var(--border);

      border-radius: var(--radius);

      box-shadow: var(--shadow);

    }

    .summary-card {

      padding: 16px;

    }

    .summary-head h2 {

      margin: 0;

      font-size: 17px;

      letter-spacing: -.02em;

    }

    .pill {

      display: inline-flex;

      align-items: center;

      justify-content: center;

      border-radius: 999px;

      padding: 8px 12px;

      font-size: 12px;

      font-weight: 800;

      border: 1px solid transparent;

      min-width: 96px;

    }

    .pill.positive { color: #b8ffd1; background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.22); }

    .pill.negative { color: #ffb3b3; background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.22); }

    .pill.neutral  { color: #ffe29c; background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.22); }

    .bank-card {

      position: relative;

      overflow: hidden;

      border-radius: 22px;

      padding: 18px;

      margin-bottom: 14px;

      background:

        radial-gradient(circle at top right, rgba(96,165,250,.18), transparent 30%),

        linear-gradient(135deg, rgba(9,20,42,1) 0%, rgba(13,32,67,1) 55%, rgba(8,16,30,1) 100%);

      border: 1px solid rgba(96,165,250,.14);

      box-shadow: 0 18px 40px rgba(0,0,0,.35);

    }

    .bank-label {

      font-size: 12px;

      font-weight: 800;

      text-transform: uppercase;

      letter-spacing: .08em;

      color: #bad1ff;

    }

    .hide-balance-btn {

      width: 42px;

      height: 42px;

      border-radius: 50%;

      background: rgba(255,255,255,.05);

      border: 1px solid rgba(255,255,255,.10);

      display: flex;

      align-items: center;

      justify-content: center;

      color: #eaf2ff;

      cursor: pointer;

      transition: all .2s ease;

      padding: 0;

    }

    .hide-balance-btn:hover {

      background: rgba(255,255,255,.10);

      transform: scale(1.05);

    }

    .bank-value {

      font-size: clamp(38px, 8vw, 68px);

      line-height: 1;

      letter-spacing: -.05em;

      font-weight: 900;

      color: #fff;

      text-shadow: 0 0 26px rgba(96,165,250,.22);

    }

    .metrics {

      display: grid;

      gap: 10px;

      grid-template-columns: 1fr;

    }

    .metric {

      border-radius: 18px;

      padding: 14px;

      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));

      border: 1px solid rgba(148,163,184,.10);

    }

    .metric-label {

      color: var(--muted);

      font-size: 12px;

      font-weight: 600;

      margin-bottom: 8px;

    }

    .metric-value {

      font-size: 27px;

      font-weight: 900;

      letter-spacing: -.04em;

      line-height: 1;

    }

    .metric-value.blue { color: #b8d4ff; }

    .metric-value.green { color: #b8ffd1; }

    .metric-value.red { color: #ffb3b3; }

    .history-card {

      padding: 14px;

      border-radius: 16px;

      border: 1px solid rgba(96,165,250,.12);

      background: rgba(255,255,255,.02);

      margin-top: 14px;

    }

    .history-card-top {

      display: flex;

      justify-content: space-between;

      align-items: flex-start;

      gap: 10px;

      margin-bottom: 6px;

    }

    .history-card-title {

      font-size: 13px;

      font-weight: 800;

      color: #dbeafe;

      margin-bottom: 6px;

    }

    .history-card-text {

      font-size: 12px;

      color: var(--muted);

      line-height: 1.45;

    }

    .danger-mini-btn {

      min-height: 34px;

      padding: 0 12px;

      border-radius: 10px;

      background: rgba(239,68,68,.12);

      color: #ffb3b3;

      border: 1px solid rgba(239,68,68,.22);

      font-size: 11px;

      font-weight: 800;

      white-space: nowrap;

    }

    .history-list {

      display: grid;

      gap: 10px;

      margin-top: 12px;

    }

    .history-item {

      padding: 14px;

      border-radius: 16px;

      border: 1px solid rgba(96,165,250,.12);

      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));

      cursor: pointer;

      transition: transform .16s ease, border-color .16s ease, background .16s ease;

    }

    .history-item:hover {

      transform: translateY(-1px);

      border-color: rgba(96,165,250,.22);

      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));

    }

    .history-user {

      font-size: 14px;

      font-weight: 900;

      color: #eaf2ff;

    }

    .history-time {

      font-size: 12px;

      color: var(--muted);

      white-space: nowrap;

      text-align: right;

    }

    .history-item-grid {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 10px;

    }

    .history-mini-card {

      padding: 10px 12px;

      border-radius: 14px;

      background: rgba(255,255,255,.03);

      border: 1px solid rgba(148,163,184,.10);

    }

    .history-mini-label {

      font-size: 11px;

      color: var(--muted);

      margin-bottom: 6px;

    }

    .history-mini-value {

      font-size: 15px;

      font-weight: 900;

      color: #fff;

    }

    .history-mini-value.red { color: #ffb3b3; }

    .history-empty {

      padding: 14px;

      border-radius: 16px;

      border: 1px dashed rgba(148,163,184,.16);

      color: var(--muted);

      font-size: 13px;

    }

    .turnos {

      display: grid;

      gap: 14px;

      margin-top: 14px;

    }

    .turno {

      padding: 14px;

      overflow: hidden;

    }

    .turno-head {

      align-items: flex-start;

      margin-bottom: 14px;

    }

    .turno-head h3 {

      margin: 0;

      font-size: 18px;

      letter-spacing: -.02em;

    }

    .turno-head small {

      display: block;

      color: var(--muted);

      margin-top: 4px;

      font-size: 12px;

    }

    .turno-total {

      text-align: right;

      flex-shrink: 0;

    }

    .turno-total .label {

      color: var(--muted);

      font-size: 11px;

      margin-bottom: 4px;

    }

    .turno-total .value {

      font-size: 18px;

      font-weight: 800;

      color: #e2ebff;

    }

    .turno-meta {

      margin-top: 12px;

      padding: 12px;

      border-radius: 16px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.025);

    }

    .finance-block {

      margin-top: 14px;

      padding: 14px;

      border-radius: 18px;

      border: 1px solid rgba(148,163,184,.10);

      background: linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,.01));

    }

    .finance-head h4 {

      margin: 0;

      font-size: 14px;

      letter-spacing: -.02em;

    }

    .finance-total {

      font-size: 14px;

      font-weight: 900;

      white-space: nowrap;

    }

    .finance-total.red { color: #ffb3b3; }

    .finance-total.blue { color: #b8d4ff; }

    .fields {

      display: grid;

      grid-template-columns: 1fr;

      gap: 10px;

    }

    .dynamic-list {

      display: grid;

      gap: 10px;

      margin-top: 2px;

    }

    .dynamic-row {

      display: grid;

      grid-template-columns: 1.15fr .85fr auto auto;

      gap: 8px;

      align-items: end;

      padding: 10px;

      border: 1px solid rgba(148,163,184,.10);

      border-radius: 14px;

      background: rgba(255,255,255,.018);

    }

    .dynamic-row.outflow {

      background: linear-gradient(180deg, rgba(239,68,68,.05), rgba(239,68,68,.025));

      border-color: rgba(239,68,68,.14);

    }

    .dynamic-row.pending {

      background: linear-gradient(180deg, rgba(245,158,11,.05), rgba(245,158,11,.025));

      border-color: rgba(245,158,11,.14);

    }

    .signed-preview {

      min-height: 48px;

      display: flex;

      align-items: center;

      justify-content: flex-end;

      padding: 0 14px;

      border-radius: 14px;

      font-size: 15px;

      font-weight: 900;

      white-space: nowrap;

      border: 1px solid rgba(148,163,184,.08);

      background: rgba(6,15,30,.95);

    }

    .signed-preview.red { color: #ff9b9b; }

    .signed-preview.amber { color: #ffd88a; }

    .remove-btn {

      min-height: 48px;

      padding: 0 14px;

      border-radius: 14px;

      background: rgba(239,68,68,.12);

      color: #ffb3b3;

      border: 1px solid rgba(239,68,68,.2);

      font-size: 13px;

      font-weight: 800;

    }

    .inline-actions {

      display: flex;

      gap: 8px;

      flex-wrap: wrap;

      margin-top: 10px;

      margin-bottom: 6px;

    }

    button {

      border-radius: 14px;

      padding: 13px 16px;

      font-size: 14px;

    }

    .btn-add {

      display: inline-flex;

      align-items: center;

      justify-content: center;

      min-height: 42px;

      color: white;

      background: linear-gradient(135deg, #0f4cbd, #1d4ed8);

      box-shadow: 0 8px 20px rgba(15,76,189,.28);

    }

    .top-user-bar {

      margin-bottom: 12px;

      padding: 12px 14px;

      border-radius: 16px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.02);

    }

    .top-user-info {

      display: flex;

      flex-direction: column;

      gap: 3px;

    }

    .top-user-name {

      font-size: 13px;

      font-weight: 800;

      color: #e2ebff;

    }

    .top-user-email {

      font-size: 12px;

      color: #8fa2c0;

    }

    .logout-btn {

      min-height: 38px;

      padding: 0 14px;

      border-radius: 12px;

      background: rgba(239,68,68,.12);

      color: #ffb3b3;

      border: 1px solid rgba(239,68,68,.22);

      font-size: 12px;

      font-weight: 800;

    }

    .reports-menu {

      position: fixed;

      top: 76px;

      left: 14px;

      z-index: 130;

      width: calc(100% - 28px);

      max-width: 320px;

      border-radius: 18px;

      border: 1px solid rgba(148,163,184,.12);

      background: linear-gradient(180deg, rgba(10,18,34,.98), rgba(10,18,34,1));

      box-shadow: 0 24px 60px rgba(0,0,0,.36);

      padding: 10px;

    }

    .reports-menu-item {

      width: 100%;

      min-height: 46px;

      border-radius: 14px;

      border: 1px solid rgba(148,163,184,.08);

      background: rgba(255,255,255,.03);

      color: #eaf2ff;

      text-align: left;

      font-size: 14px;

      font-weight: 800;

      padding: 0 14px;

      margin-bottom: 8px;

    }

    .reports-menu-item:last-child {

      margin-bottom: 0;

    }

    .report-screen {

      width: 100%;

      max-width: 1180px;

      margin: 0 auto 14px;

      padding: 16px;

      border-radius: 20px;

      border: 1px solid rgba(148,163,184,.12);

      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));

      box-shadow: var(--shadow);

    }

    .report-head h3 {

      margin: 0;

      font-size: 18px;

      letter-spacing: -.03em;

    }

    .report-close-btn {

      min-height: 38px;

      padding: 0 14px;

      border-radius: 12px;

      background: rgba(239,68,68,.12);

      color: #ffb3b3;

      border: 1px solid rgba(239,68,68,.20);

      font-size: 12px;

      font-weight: 800;

    }

    .report-grid {

      display: grid;

      gap: 10px;

      grid-template-columns: 1fr;

    }

    .report-card {

      padding: 14px;

      border-radius: 16px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.03);

    }

    .report-card-label {

      font-size: 12px;

      color: var(--muted);

      margin-bottom: 8px;

    }

    .report-card-value {

      font-size: 24px;

      font-weight: 900;

      letter-spacing: -.03em;

    }

    .report-card-value.red { color: #ffb3b3; }

    .report-card-value.green { color: #b8ffd1; }

    .report-list {

      margin-top: 14px;

      display: grid;

      gap: 10px;

    }

    .report-list-item {

      padding: 12px;

      border-radius: 16px;

      border: 1px solid rgba(148,163,184,.10);

      background: rgba(255,255,255,.02);

    }

    .report-list-name {

      font-size: 13px;

      font-weight: 800;

      color: #eaf2ff;

    }

    .report-list-date {

      font-size: 12px;

      color: var(--muted);

    }

    .report-list-lines {

      display: grid;

      gap: 6px;

    }

    .report-line {

      display: flex;

      justify-content: space-between;

      gap: 10px;

      font-size: 12px;

      color: #dbeafe;

    }

    .bottom-bar {

      position: fixed;

      left: 0;

      right: 0;

      bottom: 0;

      z-index: 50;

      padding: 8px 10px calc(8px + var(--safe-bottom));

      background: linear-gradient(180deg, rgba(3,7,18,0), rgba(3,7,18,.90) 18%, rgba(3,7,18,.98) 100%);

      backdrop-filter: blur(10px);

    }

    .bottom-bar-inner {

      width: 100%;

      max-width: 1180px;

      margin: 0 auto;

      display: grid;

      grid-template-columns: repeat(4, 1fr);

      gap: 8px;

    }

    .bottom-bar button {

      min-height: 42px;

      padding: 10px 8px;

      font-size: 11px;

      border-radius: 12px;

      letter-spacing: -.01em;

    }

    .main-btn {

      background: linear-gradient(135deg, #0f4cbd, #2563eb);

      color: white;

      box-shadow: 0 10px 28px rgba(15,76,189,.34);

    }

    .secondary-btn {

      background: rgba(255,255,255,.06);

      color: white;

      border: 1px solid rgba(148,163,184,.10);

    }

    .pdf-btn {

      background: linear-gradient(135deg, #b45309, #f59e0b);

      color: white;

      box-shadow: 0 10px 28px rgba(245,158,11,.28);

    }

    .close-btn {

      background: linear-gradient(135deg, #047857, #10b981);

      color: white;

      box-shadow: 0 10px 28px rgba(16,185,129,.25);

    }

    .modal {

      position: fixed;

      inset: 0;

      z-index: 120;

      display: flex;

      align-items: flex-end;

      justify-content: center;

    }

    .modal-backdrop {

      position: absolute;

<body>

  <section id="authScreen" class="auth-screen">

    <div class="auth-card">

      <div class="auth-logo">BK</div>

      <h1 class="auth-title">Bank King</h1>

      <p class="auth-subtitle">Acesso interno Central King.</p>

      <div class="auth-toggle">

        <button id="tabLogin" class="auth-tab active" type="button">Entrar</button>

        <button id="tabRegister" class="auth-tab" type="button">Registrar</button>

      </div>

            <form id="loginForm" class="auth-form">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="Digite seu email" required />
        </div>

        <div class="field">
          <label for="loginPassword">Senha</label>
          <input id="loginPassword" type="password" placeholder="Digite sua senha" required />
        </div>

        <button class="auth-submit" type="submit">Entrar</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <div class="field">
          <label>Nome</label>
          <input id="registerName" type="text" required />
        </div>

        <div class="field">
          <label>Email</label>
          <input id="registerEmail" type="email" required />
        </div>

        <div class="field">
          <label>Senha</label>
          <input id="registerPassword" type="password" required />
        </div>

        <button class="auth-submit">Registrar</button>
      </form>

    </div>
  </section>

  <div id="appShell" class="hidden">

    <div class="top-user-bar">
      <div>
        <div id="activeUserName" class="top-user-name"></div>
        <div id="activeUserEmail" class="top-user-email"></div>
      </div>
      <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>

    <div style="padding:20px;">
      <h2>BANCA TOTAL</h2>
      <button id="toggleBalance">👁</button>
      <div id="bankValue">R$ 0,00</div>
    </div>

    <button id="adminBtn" class="admin-fab">⚙️ ADMIN</button>

  </div>

<script>
const USERS_KEY = "bk_users";
const ACTIVE_KEY = "bk_active";
const ADMIN_CODE = "9087";

let balance = 0;
let visible = true;

/* ================= LOGIN ================= */
loginForm.addEventListener("submit", e=>{
  e.preventDefault();

  const email = loginEmail.value.trim();
  const pass = loginPassword.value;

  const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  const user = users.find(u=>u.email === email && u.password === pass);

  if(!user){
    alert("Email ou senha incorretos");
    return;
  }

  localStorage.setItem(ACTIVE_KEY, JSON.stringify(user));
  startApp(user);
});

/* ================= REGISTER ================= */
registerForm.addEventListener("submit", e=>{
  e.preventDefault();

  const name = registerName.value;
  const email = registerEmail.value;
  const pass = registerPassword.value;

  let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  if(users.find(u=>u.email === email)){
    alert("Email já existe");
    return;
  }

  users.push({name,email,password:pass});
  localStorage.setItem(USERS_KEY, JSON.stringify(users));

  alert("Usuário criado!");
  tabLogin.click();
});

/* ================= TOGGLE LOGIN/REGISTER ================= */
tabLogin.onclick = ()=>{
  loginForm.classList.remove("hidden");
  registerForm.classList.add("hidden");
};

tabRegister.onclick = ()=>{
  registerForm.classList.remove("hidden");
  loginForm.classList.add("hidden");
};

/* ================= APP ================= */
function startApp(user){
  authScreen.classList.add("hidden");
  appShell.classList.remove("hidden");

  activeUserName.textContent = user.name;
  activeUserEmail.textContent = user.email;

  render();
}

/* ================= LOGOUT ================= */
logoutBtn.onclick = ()=>{
  localStorage.removeItem(ACTIVE_KEY);
  location.reload();
};

/* ================= BALANCE ================= */
function money(v){
  return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function render(){
  bankValue.textContent = visible ? money(balance) : "••••••";
}

toggleBalance.onclick = ()=>{
  visible = !visible;
  render();
};

/* ================= ADMIN ================= */
adminBtn.onclick = ()=>{
  const code = prompt("Digite código interno:");
  if(code !== ADMIN_CODE){
    alert("Código incorreto");
    return;
  }

  showAdmin();
};

function showAdmin(){
  const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  let text = "USUÁRIOS:\n\n";

  users.forEach((u,i)=>{
    text += `${i+1}. ${u.name} (${u.email})\n`;
  });

  alert(text || "Sem usuários");
}

/* ================= AUTO LOGIN ================= */
const saved = localStorage.getItem(ACTIVE_KEY);
if(saved){
  startApp(JSON.parse(saved));
}
</script>
